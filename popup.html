<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 400px;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    .form-group {
      margin-bottom: 15px 0;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #4285F4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #3367D6;
    }
    #status {
      margin-top: 10px 0;
      padding: 10px;
      border-radius: 4px;
      display: none;
    }
    .success {
      background-color: #d4edda;
      color: #155724;
    }
    .error {
      background-color: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <h3>SMTP邮件发送器</h3>
  
  <div class="form-group">
    <label>SMTP服务器:</label>
    <input type="text" id="smtpServer" placeholder="smtp.example.com">
  </div>
  
  <div class="form-group">
    <label>SMTP端口:</label>
    <input type="number" id="smtpPort" placeholder="465">
  </div>
  
  <div class="form-group">
    <label>用户名:</label>
    <input type="email" id="username" placeholder="your-email@example.com">
  </div>
  
  <div class="form-group">
    <label>密码/授权码:</label>
    <input type="password" id="password" placeholder="password">
  </div>
  
  <div class="form-group">
    <label>收件人:</label>
    <input type="email" id="toEmail" placeholder="recipient@example.com">
  </div>
  
  <div class="form-group">
    <label>邮件主题:</label>
    <input type="text" id="subject" placeholder="邮件主题">
  </div>
  
  <div class="form-group">
    <label>邮件内容:</label>
    <textarea id="body" rows="4" placeholder="邮件内容"></textarea>
  </div>
  
  <button id="sendBtn">发送邮件</button>
  
  <div id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
