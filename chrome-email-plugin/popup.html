<!DOCTYPE html>
<html>
<head>
  <title>Email Sender Plugin</title>
  <style>
    body {
      width: 200px;
      height: 150px;
      padding: 10px;
      font-family: Arial, sans-serif;
    }
    h2 {
      font-size: 16px;
      margin-top: 0;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background-color: #45a049;
    }
    #status {
      margin-top: 15px;
      text-align: center;
      font-size: 12px;
      color: #333;
    }
  </style>
</head>
<body>
  <h2>Email Sender</h2>
  <button id="sendEmail">Send Test Email</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
