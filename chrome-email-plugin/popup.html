<!DOCTYPE html>
<html>
<head>
  <title>Email Sender Plugin</title>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    h2 {
      font-size: 16px;
      margin-top: 0;
      text-align: center;
    }
    .form-group {
      margin-bottom: 10px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 12px;
      font-weight: bold;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 6px;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 3px;
    }
    input[type="checkbox"] {
      margin-right: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background-color: #45a049;
    }
    #status {
      margin-top: 15px;
      text-align: center;
      font-size: 12px;
      color: #333;
    }
    .monitor-section {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <h2>Email Sender</h2>
  
  <div class="form-group">
    <button id="sendEmail">Send Test Email</button>
  </div>
  
  <div class="monitor-section">
    <h3>Element Monitor</h3>
    
    <div class="form-group">
      <label for="elementId">Element ID to monitor:</label>
      <input type="text" id="elementId" placeholder="e.g., message-2947">
    </div>
    
    <div class="form-group">
      <label>
        <input type="checkbox" id="monitorEnabled"> Enable monitoring
      </label>
    </div>
    
    <div class="form-group">
      <button id="saveConfig">Save Config</button>
    </div>
  </div>
  
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
